<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TherapyPlanner</title>
  <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="patient-schedule.css">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="TherapyPlanner.js"></script>
    <script src="TherapyListComponent.js"></script>
    <script src="PatientSchedule.js"></script>
    <script src="PatientScheduleComponent.js"></script>
  <style>
    .btn-group {
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <div id="first" class="col-sm">

      </div>
      <div id="second" class="col-sm">

      </div>
    </div>
  </div>
  <script>
    (async () => {
      let config;

      if (typeof fetch === 'function') {
        try {
          const response = await fetch('config/scheduleConfig.json');
          if (response.ok) {
            config = await response.json();
            window.THERAPY_PLANNER_CONFIG = config;
          } else {
            console.warn(`Unable to load schedule configuration (status: ${response.status}). Using defaults.`);
          }
        } catch (error) {
          console.warn('Unable to load schedule configuration, using defaults.', error);
        }
      } else {
        console.warn('Fetch API not available; using default schedule configuration.');
      }

      const planner = new TherapyPlanner(config);

      // Patient appointment list component (placed above the eye cards)
      const patientScheduleEl = createPatientScheduleComponent(planner);
      document.body.insertBefore(patientScheduleEl, document.querySelector('.container-fluid'));

      const rightCard = createTherapyListComponent('cardRightEye', TherapyPlanner.RIGHTEYE, planner);
      const leftCard = createTherapyListComponent('cardLeftEye', TherapyPlanner.LEFTEYE, planner);
      document.getElementById('first').appendChild(rightCard);
      document.getElementById('second').appendChild(leftCard);
    })();
  </script>
  </body>
</html>
