name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.timezone }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        timezone:
          - default
          - Europe/Berlin
          - UTC

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Run tests in runner default timezone
        if: matrix.timezone == 'default'
        run: npm test

      - name: Run tests in configured timezone
        if: matrix.timezone != 'default'
        run: npm test
        env:
          TZ: ${{ matrix.timezone }}
